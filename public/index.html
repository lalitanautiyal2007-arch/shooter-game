<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ARENA 2 — Tactical Shooter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:#030508;
    color:#e0e8ff;
    font-family:'Share Tech Mono','Courier New',monospace;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;
    overflow:hidden;
    user-select:none;
  }
  #game-wrapper{
    display:flex;flex-direction:column;align-items:center;gap:8px;
    width:100%;max-width:840px;padding:0 4px;
  }
  /* HUD bar */
  #hud{
    display:flex;align-items:center;justify-content:space-between;
    width:800px;max-width:100%;
    background:linear-gradient(90deg,#0a0e1a,#0d1220,#0a0e1a);
    border:1px solid #1e3050;
    border-bottom:none;
    padding:6px 14px;
    border-radius:6px 6px 0 0;
  }
  .player-panel{display:flex;align-items:center;gap:8px;}
  .player-panel.p1{flex-direction:row;}
  .player-panel.p2{flex-direction:row-reverse;}
  .score-badge{
    font-size:18px;font-weight:bold;
    padding:2px 10px;
    border-radius:4px;
    letter-spacing:2px;
  }
  #p1score{background:#0277bd44;border:1px solid #4fc3f755;color:#4fc3f7;}
  #p2score{background:#c6282844;border:1px solid #ef9a9a55;color:#ef9a9a;}
  #lives-p1,#lives-p2{font-size:16px;letter-spacing:2px;}
  #lives-p1{color:#4fc3f7;}
  #lives-p2{color:#ef9a9a;}
  #center-info{text-align:center;flex:1;}
  #youLabel{font-size:11px;letter-spacing:1px;opacity:0.9;color:#c0d8ff;}
  #roundNum{font-size:10px;opacity:0.5;margin-top:1px;}

  /* Canvas */
  canvas{
    display:block;
    border:1px solid #1e3050;
    border-top:none;
    border-bottom:none;
    width:800px;max-width:100%;
    cursor:crosshair;
    image-rendering:pixelated;
  }
  canvas:focus{outline:none;}

  /* Controls bar */
  #controls-bar{
    width:800px;max-width:100%;
    background:linear-gradient(90deg,#0a0e1a,#0d1220,#0a0e1a);
    border:1px solid #1e3050;
    border-top:1px solid #111a2a;
    border-radius:0 0 6px 6px;
    padding:5px 14px;
    display:flex;align-items:center;justify-content:space-between;gap:6px;
  }
  #status{font-size:10px;opacity:0.5;}
  .kb-hint{
    font-size:9px;opacity:0.45;
    display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;
  }
  .kb-hint span{white-space:nowrap;}
  kbd{
    background:#1a2535;border:1px solid #2a4060;
    border-radius:3px;padding:1px 4px;font-size:8px;
    font-family:inherit;color:#7aaccc;
  }

  /* Mobile UI */
  #mobile-ui{
    display:none;
    position:fixed;bottom:0;left:0;width:100%;height:180px;
    pointer-events:none;
    z-index:10;
  }
  #joystick-base{
    position:absolute;left:30px;bottom:30px;
    width:90px;height:90px;
    background:#ffffff0e;border:2px solid #ffffff22;
    border-radius:50%;pointer-events:all;
    display:flex;align-items:center;justify-content:center;
  }
  #joystick-knob{
    width:36px;height:36px;
    background:#4fc3f755;border:2px solid #4fc3f7;
    border-radius:50%;
    transition:transform 0.05s;
  }
  .mobile-btn{
    position:absolute;pointer-events:all;
    width:60px;height:60px;border-radius:50%;
    border:2px solid;
    background:#00000066;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;font-family:inherit;
    color:#fff;cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  #shoot-btn{right:30px;bottom:80px;border-color:#ff5252;background:#ff525222;}
  #grenade-btn{right:100px;bottom:30px;border-color:#ffea00;background:#ffea0022;font-size:14px;}
  #dash-btn{right:30px;bottom:10px;border-color:#69f0ae;background:#69f0ae22;font-size:13px;}

  /* Scrollbar */
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:#0d1220;}
  ::-webkit-scrollbar-thumb{background:#2a4060;}
</style>
</head>
<body>
<div id="game-wrapper">
  <div id="hud">
    <div class="player-panel p1">
      <div class="score-badge" id="p1score">P1 0</div>
      <div id="lives-p1">♥♥♥</div>
    </div>
    <div id="center-info">
      <div id="youLabel">Connecting...</div>
      <div id="roundNum">Round 1</div>
    </div>
    <div class="player-panel p2">
      <div class="score-badge" id="p2score">P2 0</div>
      <div id="lives-p2">♥♥♥</div>
    </div>
  </div>

  <canvas id="canvas" width="800" height="500" tabindex="0"></canvas>

  <div id="controls-bar">
    <div id="status">Connecting...</div>
    <div class="kb-hint">
      <span><kbd>W A S D</kbd> / <kbd>↑←↓→</kbd> Move</span>
      <span><kbd>LMB</kbd> Shoot</span>
      <span><kbd>G</kbd>/<kbd>P</kbd> Grenade</span>
      <span><kbd>Shift</kbd> Dash</span>
      <span><kbd>1-5</kbd> Weapon</span>
      <span><kbd>T</kbd> Chat</span>
    </div>
  </div>
</div>

<!-- Mobile UI -->
<div id="mobile-ui">
  <div id="joystick-base"><div id="joystick-knob"></div></div>
  <button class="mobile-btn" id="shoot-btn">🔫</button>
  <button class="mobile-btn" id="grenade-btn">💣</button>
  <button class="mobile-btn" id="dash-btn">⚡DASH</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>
</body>
</html>
